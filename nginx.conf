server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: let React Router handle all routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived caching for hashed build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}